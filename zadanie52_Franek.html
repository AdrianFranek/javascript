<!DOCTYPE html> 
<html lang="pl"> 
<head>  
   <meta charset="utf-8"> 
    <title>  Przykład użycia pętli </title> 
</head>  
<body>  
   <font style="color:red;font-size:2cm;">Adrian Franek</font> <br>
   <font style="color:blue;font-size:5mm;">Wyprowadzanie liczb od 1 do 10 przesuniętych o jedną spację w prawo. Demonstarcja pętli zagnieżdżonych </font> <br>
  <script language="JavaScript">
   for ( var i=1; i<=10; i++) 
    { 
       for ( var k=1; k<=i; k++) 
        { 
           document.write("&nbsp");     
         } 
         document.write(i+"<br>"); 
     } 
  </script>
</body>  
</html>
